<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏥 Медицинский центр "Здоровье"</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🏥</span>
                    <h1>Медицинский центр <span class="highlight">"Здоровье"</span></h1>
                </div>
                <p class="subtitle">Современная медицина, забота о каждом пациенте</p>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-number" id="totalPatients">0</span>
                <span class="stat-label">Всего пациентов</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="activePatients">0</span>
                <span class="stat-label">Активных</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="completedPatients">0</span>
                <span class="stat-label">Завершенных</span>
            </div>
        </div>

        <div class="main-content">
            <div class="form-section">
                <h2>📝 Добавить пациента</h2>
                <form id="patientForm">
                    <div class="form-group">
                        <input type="text" id="name" placeholder="ФИО пациента" required>
                    </div>
                    <div class="form-group">
                        <input type="number" id="age" placeholder="Возраст" required min="0" max="120">
                    </div>
                    <div class="form-group">
                        <input type="text" id="diagnosis" placeholder="Диагноз">
                    </div>
                    <div class="form-group">
                        <input type="tel" id="phone" placeholder="Телефон">
                    </div>
                    <div class="form-group">
                        <select id="status">
                            <option value="active">Активный</option>
                            <option value="completed">Завершен</option>
                            <option value="waiting">В очереди</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">➕ Добавить пациента</button>
                </form>
            </div>

            <div class="list-section">
                <h2>👨‍⚕️ Список пациентов</h2>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск по имени или диагнозу...">
                </div>
                <div id="patientsList">
                    <p class="empty-message">Загрузка пациентов...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
